# wsnail.com CI/CD Pipeline
# 自动测试 + Lighthouse 检查 + 部署

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 取消同一 PR 的旧运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Job 1: 代码质量检查
  # ============================================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: ESLint 检查
        run: npm run lint

  # ============================================
  # Job 2: 类型检查
  # ============================================
  type-check:
    name: TypeScript 类型检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 检查
        run: npx tsc --noEmit

  # ============================================
  # Job 3: 构建测试
  # ============================================
  build:
    name: 构建测试
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://wsnail.com

  # ============================================
  # Job 4: Lighthouse CI (仅 main 和 PR)
  # ============================================
  lighthouse:
    name: Lighthouse 性能检查
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://wsnail.com

      - name: 运行 Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          urls: |
            https://wsnail.com
            https://wsnail.com/tools/fba-fee-calculator
          budgetPath: ./lighthouse-budget.json
          runs: 3

  # ============================================
  # Job 5: 部署通知
  # ============================================
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [lighthouse]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 发送飞书通知
        run: |
          echo "部署成功！主分支已更新"
          # TODO: 配置飞书 webhook
